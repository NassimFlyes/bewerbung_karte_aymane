<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bewerbung Card</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #dfe9f3, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    width: 370px;
    background: #fff;
    border-radius: 28px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    text-align: center;
    padding-bottom: 30px;
    position: relative;
    overflow: hidden;
}

/* TOP DESIGN BAR */
.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 120px;
    background: linear-gradient(135deg, #4CAF50, #00c6ff);
}

/* PROFILE IMAGE */
.card img.profile {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    margin-top: 40px;
    object-fit: cover;
    border: 6px solid white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    position: relative;
    z-index: 2;
}

/* TEXT */
.card h2 {
    margin: 15px 0 5px;
    font-size: 23px;
    font-weight: 600;
}

.card p {
    color: #777;
    font-size: 14px;
    margin-bottom: 25px;
}

/* FILE BUTTONS */
.files {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 0 30px;
}

.files a {
    text-decoration: none;
    padding: 14px;
    border-radius: 14px;
    background: #f5f7fa;
    color: #333;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.3s ease;
    border: 1px solid #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

/* HOVER */
.files a:hover {
    background: linear-gradient(135deg, #4CAF50, #00c6ff);
    color: white;
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* FOOTER */
.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #aaa;
}

</style>
</head>

<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-BSZ6K8ZEQT');
</script>

<body>

<div class="card">
    <img src="./img.jpeg" alt="Profilbild" class="profile">
    <h2>Aymane Kanjaa</h2>
    <p> Bewerbung um eine Ausbildung als Pflegefachmann</p>

    <div class="files">
        <a href="lebenslauf.pdf" target="_blank">📄 Lebenslauf</a>
        <a href="anschreiben.pdf" target="_blank">✉️ Anschreiben</a>
        <a href="zeugnisse.pdf" target="_blank">📑 Zeugnisse</a>
    </div>

    <div class="footer">kanjaa.ayman5@gmail.com ||  © 2026</div>
</div>

</body>
</html>
