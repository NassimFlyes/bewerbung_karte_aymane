<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bewerbung Card</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e3f2fd, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    width: 370px;
    background: #fff;
    border-radius: 25px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    text-align: center;
    padding-bottom: 30px;
    position: relative;
    overflow: hidden;
}

/* TOP BAR */
.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 130px;
    background: linear-gradient(135deg, #1976d2, #26c6da);
}

/* ICON */
.icon {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    color: white;
}

/* PROFILE */
.card img.profile {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    margin-top: 50px;
    object-fit: cover;
    border: 6px solid white;
    box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    
    position: relative;
    display: block;
    margin-left: auto;
    margin-right: auto;

    transition: 0.3s ease;
}

.card img.profile:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}
/* NAME */
.card h2 {
    margin: 15px 0 5px;
    font-size: 22px;
    font-weight: 600;
    color: #0d47a1;
}

/* TEXT */
.card p {
    color: #555;
    font-size: 14px;
    margin-bottom: 25px;
}

/* FILES */
.files {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 0 30px;
}

.files a {
    text-decoration: none;
    padding: 14px;
    border-radius: 12px;
    background: #f1f8ff;
    color: #0d47a1;
    font-size: 14px;
    font-weight: 500;
    transition: 0.3s;
    border: 1px solid #bbdefb;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.files a:hover {
    background: linear-gradient(135deg, #1976d2, #26c6da);
    color: white;
    transform: translateY(-4px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* FOOTER */
.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #888;
}
</style>
<script>
  window.dataLayer = window.dataLayer || [];

  gtag('config', 'G-974K04LTDF');
</script>
</head>

<body>

<div class="card">
    <div class="icon">🏥</div>

    <img src="./img.jpeg" alt="Profilbild" class="profile">
    
    <h2>Aymane Kanjaa</h2>
    <p>🩺 Bewerbung um eine Ausbildung als Pflegefachmann</p>

    <div class="files">

    </div>

    <div class="footer">📧 kanjaa.ayman5@gmail.com | © 2026</div>
</div>

</body>
</html>
